name: CI/CD Workflow

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'
      - name: Test application
        working-directory: ./backend
        run: mvn test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.3
        env:
          POSTGRES_DB: calorydb
          POSTGRES_USER: calory
          POSTGRES_PASSWORD: calory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U calory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/calorydb
      SPRING_DATASOURCE_USERNAME: calory
      SPRING_DATASOURCE_PASSWORD: calory
      # Test-only secret for this ephemeral CI database - never used outside the e2e job.
      JWT_SECRET: ci-e2e-jwt-signing-secret-32-bytes-minimum-length-required
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.0'
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      # Runs the real Angular dev server against the real Spring Boot backend against a real
      # Postgres (the service container above) - the same "don't mock what you're testing"
      # principle the backend's Testcontainers-based integration tests already follow.
      - name: Run end-to-end tests
        working-directory: ./frontend
        run: npm run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'
      - name: Build with Maven
        working-directory: ./backend
        run: mvn -B clean package -DskipTests
      - name: Build Docker image
        working-directory: ./backend
        run: |
          docker build -f ./Dockerfile -t mbirk2/calory-count:latest .
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Docker image to Docker Hub
        run: docker push mbirk2/calory-count:latest
