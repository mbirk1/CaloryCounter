name: CI/CD Workflow

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

# Node/Angular version shared by every job that runs the frontend directly (not via the
# Maven-driven build, which pins its own Node version independently in backend/pom.xml).
# Angular 22 requires Node >=22.22.3, see https://angular.dev/reference/versions.
env:
  NODE_VERSION: '22.22.3'
  JAVA_VERSION: '22'

jobs:
  backend-test:
    name: Backend unit & integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
          cache-dependency-path: backend/pom.xml
      - name: Test application
        working-directory: ./backend
        run: mvn -B test

  frontend-unit-test:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run unit tests
        working-directory: ./frontend
        run: npx ng test --watch=false --browsers=ChromeHeadless

  static-analysis:
    name: Static analysis (Checkstyle + ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
          cache-dependency-path: backend/pom.xml
      - name: Checkstyle
        working-directory: ./backend
        run: mvn -B checkstyle:check
      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      - name: ESLint
        working-directory: ./frontend
        run: npm run lint

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16.3
        env:
          POSTGRES_DB: calorydb
          POSTGRES_USER: calory
          POSTGRES_PASSWORD: calory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U calory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/calorydb
      SPRING_DATASOURCE_USERNAME: calory
      SPRING_DATASOURCE_PASSWORD: calory
      # Test-only secret for this ephemeral CI database - never used outside the e2e job.
      JWT_SECRET: ci-e2e-jwt-signing-secret-32-bytes-minimum-length-required
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
          cache-dependency-path: backend/pom.xml
      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      # Runs the real Angular dev server against the real Spring Boot backend against a real
      # Postgres (the service container above) - the same "don't mock what you're testing"
      # principle the backend's Testcontainers-based integration tests already follow.
      - name: Run end-to-end tests
        working-directory: ./frontend
        run: npm run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  docker-publish:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-test, frontend-unit-test, static-analysis, e2e]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mbirk2/calory-count
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
