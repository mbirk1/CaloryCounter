<div class="h-16 flex items-center justify-between bg-navbar-background px-4">
  <a
    routerLink="/dashboard"
    class="flex items-center"
    aria-label="Zum Dashboard"
  >
    <app-logo [size]="40" />
  </a>

  <div class="flex items-center gap-2">
    <a
      routerLink="/food"
      routerLinkActive="bg-navbar-linkHover"
      class="px-4 h-10 rounded-lg text-navbar-link hover:bg-navbar-linkHover flex items-center justify-center"
    >
      Lebensmittel
    </a>
    <a
      routerLink="/recipe"
      routerLinkActive="bg-navbar-linkHover"
      class="px-4 h-10 rounded-lg text-navbar-link hover:bg-navbar-linkHover flex items-center justify-center"
    >
      Rezepte
    </a>

    <div class="relative ml-2">
      <button
        type="button"
        (click)="toggleMenu()"
        class="h-10 w-10 rounded-full bg-white text-primary font-bold flex items-center justify-center"
        [attr.aria-label]="
          'Benutzermenü für ' + (authStore.user()?.email ?? '')
        "
        [attr.aria-expanded]="menuOpen()"
      >
        {{ (authStore.user()?.email ?? '?').charAt(0).toUpperCase() }}
      </button>

      @if (menuOpen()) {
        <div
          class="absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg py-2 z-10"
        >
          <div
            class="px-4 py-2 text-sm text-neutral-darkGray border-b border-neutral-lightGray truncate"
          >
            {{ authStore.user()?.email }}
          </div>
          <button
            type="button"
            (click)="logout()"
            class="w-full text-left px-4 py-2 text-sm text-neutral-darkGray hover:bg-primary-light"
          >
            Abmelden
          </button>
        </div>
      }
    </div>
  </div>
</div>
