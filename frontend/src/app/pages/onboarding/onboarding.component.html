<div class="flex justify-center px-4 py-12">
  <form
    class="flex flex-col bg-white rounded-xl p-8 gap-5 w-full max-w-sm"
    [formGroup]="form"
    (submit)="onSubmit()"
  >
    <div class="flex flex-col items-center gap-2 mb-2 text-center">
      <span class="material-symbols-rounded text-4xl text-primary">person</span>
      <span class="text-xl font-bold text-neutral-darkGray">Dein Profil</span>
      <span class="text-sm text-neutral-darkGray">
        Nur noch ein paar Angaben, damit wir dir passende Werte berechnen
        können.
      </span>
    </div>

    @if (errorMessage() !== '') {
      <app-alert [message]="errorMessage()" />
    }

    <div class="flex flex-col gap-1">
      <app-label [text]="'Größe (cm)'" />
      <app-number-input
        [placeholder]="'z.B. 175'"
        [formControlName]="'height'"
      />
    </div>

    <div class="flex flex-col gap-1">
      <app-label [text]="'Gewicht (kg)'" />
      <app-number-input
        [placeholder]="'z.B. 75'"
        [formControlName]="'weight'"
      />
    </div>

    <div class="flex flex-col gap-1">
      <app-label [text]="'Aktivitätslevel'" />
      <app-select
        [options]="activityLevels"
        [formControlName]="'activityLevel'"
      />
    </div>

    <app-button
      [type]="'submit'"
      [text]="'Fertigstellen'"
      [disabled]="form.invalid"
      [loading]="loading()"
    />
  </form>
</div>
