@if (this.data()) {
<table class="w-3/4 text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
  <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
  <tr>
    <th scope="col" class="px-6 py-3">Name</th>
    <th scope="col" class="px-6 py-3">Calory</th>
    <th scope="col" class="px-6 py-3">Grams</th>
    <th scope="col" class="px-6 py-3">Actions</th>
  </tr>
  </thead>
  <tbody>
    @for (item of this.data(); track this.data) {
      <tr
        [attr.data-id]="item.uuid"
        class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600"
      >
        <th
          scope="row"
          class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white"
        >
          {{ item.name }}
        </th>
        <td class="px-6 py-4">{{ item.calory }}</td>
        <td class="px-6 py-4">{{ item.grams }}</td>
        <td>
          <app-button
            class="mr-8 cursor-pointer text-blue-500"
            aria-label="Edit"
            >
            <fa-icon [icon]="faPen"></fa-icon>
          </app-button>
          <app-button
            class="cursor-pointer text-red-500"
            aria-label="Delete"
          >
            <fa-icon [icon]="faTrash"></fa-icon>
          </app-button>
        </td>
      </tr>
    }
  </tbody>
</table>
}
